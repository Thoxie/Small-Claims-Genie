<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- White background -->
  <rect width="32" height="32" fill="white"/>

  <!-- Lamp body shadow -->
  <ellipse cx="13" cy="23" rx="10" ry="5.5" fill="#A87008"/>

  <!-- Lamp body main -->
  <ellipse cx="13" cy="21.5" rx="10" ry="5.5" fill="#F0B429"/>

  <!-- Lid dome -->
  <path d="M4 21 Q4 12 13 10 Q22 12 22 21Z" fill="#F5C84A"/>

  <!-- Decorative band -->
  <rect x="3" y="19.5" width="20" height="3" rx="1.5" fill="#C8920A"/>
  <!-- Blue jewel inset -->
  <rect x="9" y="20.2" width="8" height="1.6" rx="0.8" fill="#1a6fbe" opacity="0.8"/>

  <!-- Lid cap -->
  <ellipse cx="13" cy="10" rx="4" ry="1.8" fill="#C8920A"/>
  <circle cx="13" cy="8.5" r="1.8" fill="#F0B429"/>
  <circle cx="13" cy="7.2" r="1" fill="#C8920A"/>

  <!-- Handle loop on left -->
  <path d="M4 20 Q0 20 0 23 Q0 26 4 25" stroke="#C8920A" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Spout curving up-right -->
  <path d="M22 18 Q27 14 27 9" stroke="#C8920A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <circle cx="27" cy="9" r="2.5" fill="#C8920A"/>
  <circle cx="27" cy="9" r="1.2" fill="#F0B429"/>

  <!-- Blue smoke from spout tip (kept inside viewBox) -->
  <path d="M26 7 Q23 4 25 2" stroke="#3b9edd" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M28 6 Q31 3 30 1" stroke="#5bb8f5" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.75"/>
</svg>

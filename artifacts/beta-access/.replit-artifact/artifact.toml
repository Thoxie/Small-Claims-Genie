kind = "web"
previewPath = "/beta/"
title = "Beta Access"
version = "1.0.0"
id = "artifacts/beta-access"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = []
localPort = 20902

[services.development]
run = "pnpm --filter @workspace/beta-access run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/beta-access", "run", "build" ]
publicDir = "artifacts/beta-access/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20902"
BASE_PATH = "/beta/"
